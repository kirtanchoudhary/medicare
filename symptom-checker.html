<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Symptom Checker</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f4f6f8;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.flex{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
border:1px solid #ddd;
}

textarea, input, select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:12px;
background:#0f766e;
color:white;
border:none;
border-radius:999px;
cursor:pointer;
width:100%;
}

.result{
background:white;
padding:20px;
border-radius:12px;
border:1px solid #ddd;
min-height:300px;
}

.error{
background:#fee2e2;
color:#b91c1c;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Symptom Checker</h2>

<div class="flex">

<div class="card">
<label>Symptoms</label>
<textarea id="symptoms"></textarea>

<label>Age</label>
<input id="age" type="number">

<label>Gender</label>
<select id="gender">
<option>Select</option>
<option>Male</option>
<option>Female</option>
</select>

<button onclick="analyze()">Analyze</button>
</div>

<div class="result" id="resultBox">
Result will appear here
</div>

</div>
</div>

<script>

// 🔥 IMPORTANT FIX
function normalize(data){

// Agar backend string bhej raha hai
if(typeof data === "string"){
try{
return JSON.parse(data);
}catch{
return {
possible_conditions:[{name:"Result",details:data}]
};
}
}

// Agar backend me error aaye
if(data.error){
return {
possible_conditions:[{name:"Error",details:data.error}]
};
}

// Agar empty response aaye
if(!data || Object.keys(data).length === 0){
return {
possible_conditions:[{name:"No Data",details:"No analysis returned"}]
};
}

return data;
}

// 🔥 PROPER UI RENDER
function render(data){

let html = "";

// CONDITIONS
if(data.possible_conditions && data.possible_conditions.length){
html += "<h3>Possible Conditions</h3>";

data.possible_conditions.forEach(c=>{
if(typeof c === "string"){
html += `<p>${c}</p>`;
}else{
html += `<p><b>${c.name}</b>: ${c.details}</p>`;
}
});
}

// MEDICINES
if(data.general_medicines && data.general_medicines.length){
html += "<h3>Medicines</h3><ul>";
data.general_medicines.forEach(m=>{
html += `<li>${m}</li>`;
});
html += "</ul>";
}

// TIPS
if(data.tips && data.tips.length){
html += "<h3>Tips</h3><ul>";
data.tips.forEach(t=>{
html += `<li>${t}</li>`;
});
html += "</ul>";
}

// DOCTOR
if(data.when_to_see_doctor && data.when_to_see_doctor.length){
html += "<h3>When to see doctor</h3><ul>";
data.when_to_see_doctor.forEach(d=>{
html += `<li>${d}</li>`;
});
html += "</ul>";
}

// fallback
if(html === ""){
html = "<div class='error'>No analysis returned ❌</div>";
}

return html;
}

// 🔥 MAIN FUNCTION
async function analyze(){

let symptoms = document.getElementById("symptoms").value;
let age = document.getElementById("age").value;
let gender = document.getElementById("gender").value;
let box = document.getElementById("resultBox");

box.innerHTML = "Analyzing... ⏳";

try{

let res = await fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({symptoms,age,gender})
});

let data = await res.json();

console.log("API RESPONSE:", data); // debugging

let parsed = normalize(data);

box.innerHTML = render(parsed);

}catch(e){
box.innerHTML = `<div class="error">Server Error ❌</div>`;
}

}

</script>

</body>
</html>
